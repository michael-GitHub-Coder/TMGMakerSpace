<app-banner 
  [heading]="'Services'" 
  [route]="'/home'" 
  [routeLabel]="'Home'">
</app-banner>

<!-- Services Section -->
<section id="services">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 mb-3" data-aos="fade-up" data-aos-duration="1000">
        <h2 class="about-title">Our Services</h2>
      </div>

      <div
        class="col-lg-6 col-md-6"
        *ngFor="let service of services; let i = index"
        [attr.data-aos-delay]="i * 100"
        data-aos="fade-right"
        data-aos-duration="1000"
      >
        <div class="service-item">
          <div class="icon">
            <img [src]="service.image" [alt]="service.title" />
          </div>
          <div class="service-item-content">
            <h3>{{ service.title }}</h3>
            <p>{{ service.description }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
