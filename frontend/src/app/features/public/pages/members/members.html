<app-banner 
  [heading]="'Members'" 
  [route]="'/home'" 
  [routeLabel]="'Home'">
</app-banner>

<!-- Members Section -->
<section id="members">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 mb-3" data-aos="fade-down" data-aos-duration="1000">
        <h2 class="about-title">Our Member Companies</h2>
        <p class="company-desc">
          The following are companies we support at TMG Makerspace, Braamfontein.
        </p>
      </div>

      <!-- Dynamic Members -->
      <div
        class="col-lg-4 col-md-6 col-sm-12 mb-3"
        *ngFor="let member of members; let i = index"
        [attr.data-aos-delay]="i * 100"
        data-aos="fade-up"
        data-aos-duration="1000"
      >
        <div class="team-item">
          <div class="team-item-avatar">
            <img [src]="member.image" [alt]="member.name" class="img-fluid rounded shadow" />
          </div>
          <div class="team-item-content">
            <h3 class="members-title">{{ member.name }}</h3>

            <!-- Badges -->
            <div class="mb-2">
              <span *ngFor="let badge of member.badges" class="badge badge-technologies me-1">
                {{ badge }}
              </span>
            </div>

            <p class="mt-3">{{ member.description }}</p>

            <!-- Links -->
            <div class="mt-2">
              <a
                *ngFor="let link of member.links"
                [href]="link.url"
                target="_blank"
                rel="noopener noreferrer"
                class="me-2"
              >
                <i [class]="link.icon" style="font-size: 1.2rem;"></i>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
