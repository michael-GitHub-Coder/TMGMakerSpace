<app-header></app-header>
<!-- Hero Section -->
<section id="hero">
  <div class="row">
    <!-- Hero Text -->
    <div class="col-lg-6 hero-content">
      <div class="container">
        <h1 data-aos="fade-up">Welcome to TMG Makerspace</h1>
        <p data-aos="fade-up" data-aos-delay="100">
          We provide Africans with the <span>knowledge</span>, <span>skills</span>, and <span>resources</span> they need to innovate and solve Africa's problems.
        </p>
        <a data-aos="fade-up" data-aos-delay="200" 
           href="./images/THULIKACEB ROBOTIC ARM.mp4" 
           class="glightbox btn button-pulse">
          <i class="bi bi-play"></i> More Info
        </a>
        <a data-aos="fade-up" data-aos-delay="300" 
           routerLink="/apply" 
           class="btn button-pulse ms-3">
          <i class="bi bi-calendar-check"></i> Become a Member
        </a>
        
      </div>
    </div>

    <!-- Hero Images -->
    <div class="col-lg-6 d-none d-lg-block" data-aos="fade-up">
      <section class="hexagon-gallery">
        <div class="hexagon-gallery-top">
          <div class="hex"><img src="./images/Home_Pic 1.jpg" alt="Hero image 1" loading="lazy"/></div>
          <div class="hex"><img src="./images/Home_Pic 2.png" alt="Hero image 2" loading="lazy"/></div>
        </div>
        <div class="hexagon-gallery-bottom">
          <div class="hex"><img src="./images/Home_Pic 3.png" alt="Hero image 3" loading="lazy"/></div>
          <div class="hex"><img src="./images/Homepage 4.jpg" alt="Hero image 4" loading="lazy"/></div>
          <div class="hex"><img src="./images/Homepage 5.jpg" alt="Hero image 5" loading="lazy"/></div>
        </div>
      </section>
    </div>
  </div>
</section>
<section id="partners">
  <div class="container">
    <div class="partners-header">
      <p>Our Clients</p>
    </div>

    <owl-carousel-o [options]="carouselOptions">
      <ng-container *ngFor="let col of columns">
        <ng-template carouselSlide>
          <div class="partner-column">
            <div class="partner-item" *ngFor="let logo of col">
              <img [src]="logo" [alt]="'Partner'" loading="lazy" />
            </div>
          </div>
        </ng-template>
      </ng-container>
    </owl-carousel-o>
  </div>
</section>
