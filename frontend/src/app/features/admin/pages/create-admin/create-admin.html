<app-header></app-header>

<div class="create-admin-page">
  <div class="create-admin-card">
    <h2>Create Admin</h2>
    <form [formGroup]="createAdminForm" (ngSubmit)="onSubmit($event)">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" formControlName="name" placeholder="Enter full name">
        <small *ngIf="createAdminForm.get('name')?.touched && createAdminForm.get('name')?.invalid">
          Name is required (min 3 characters)
        </small>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" formControlName="email" placeholder="Enter email">
        <small *ngIf="createAdminForm.get('email')?.touched && createAdminForm.get('email')?.invalid">
          Enter a valid email
        </small>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" formControlName="password" placeholder="Enter password">
        <small *ngIf="createAdminForm.get('password')?.touched && createAdminForm.get('password')?.invalid">
          Password must be at least 6 characters
        </small>
      </div>

      <!-- <div class="form-group">
        <label for="role">Role</label>
        <select id="role" formControlName="role">
          <option value="admin">Admin</option>
          <option value="superadmin">Super Admin</option>
        </select>
      </div> -->

      <button type="submit" class="create-btn">Create Admin</button>
    </form>
    <div class="extra-links">
      <button (click)="goToDashboard()" class="back-btn">Back to Dashboard</button>
    </div>
  </div>
</div>

<app-footer></app-footer>
