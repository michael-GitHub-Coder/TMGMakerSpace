<app-header></app-header>

<section class="add-blog-section">
  <div class="add-blog-card">
    <h2>Add New Blog</h2>
    <form (ngSubmit)="addBlog()">
      <div class="form-group">
        <label>Title</label>
        <input type="text" placeholder="Blog Title" [(ngModel)]="newBlog.title" name="title" required />
      </div>

      <div class="form-group">
        <label>Subtitle</label>
        <input type="text" placeholder="Blog Subtitle" [(ngModel)]="newBlog.subtitle" name="subtitle" required />
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea placeholder="Blog Description" [(ngModel)]="newBlog.description" name="description" required></textarea>
      </div>

      <div class="form-group">
        <label>Date & Time</label>
        <input type="datetime-local" [(ngModel)]="newBlog.dateTime" name="dateTime" required />
      </div>

      <div class="form-group">
        <label>Image</label>
        <input type="file" (change)="onImageUpload($event)" />
      </div>

      <div class="form-buttons">
        <button type="submit" class="btn btn-danger">Save Blog</button>
       <a routerlink="/admin/dashboard" class="btn btn-secondary w-50" href="/admin/dashboard">Cancel</a>
      </div>
    </form>
  </div>
</section>

<app-footer></app-footer>
