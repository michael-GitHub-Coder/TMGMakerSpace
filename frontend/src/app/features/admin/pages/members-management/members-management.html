<app-header></app-header>
<div class="dashboard-layout">
  <app-sidebar></app-sidebar>

  <div class="dashboard-content">
    <div class="dashboard-header">
      <h2>Membership Applications</h2>
      <p>View, approve, or reject applications</p>
    </div>

    <div *ngIf="loading">Loading applications...</div>
    <div *ngIf="error" class="error">{{ error }}</div>

    <div class="table-responsive" *ngIf="!loading && members.length">
      <table class="dashboard-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Status</th>
            <th>Documents</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let member of members">
            <td>{{ member.name }} {{ member.surname }}</td>
            <td>{{ member.email }}</td>
            <td>{{ member.phone }}</td>
            <td>{{ member.status || 'pending' }}</td>
            <td>
              <button class="btn view" (click)="viewDocuments(member)">
                View Documents
              </button>
            </td>
            <td>
              <button class="btn approve" (click)="approveApplication(member.id)">
                Approve
              </button>
              <button class="btn reject" (click)="rejectApplication(member.id)">
                Reject
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
