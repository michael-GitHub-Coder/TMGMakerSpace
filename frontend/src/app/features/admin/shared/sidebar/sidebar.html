<!-- Mobile Top Bar (Visible only on small screens) -->
<div class="mobile-header">
  <button class="sidebar-toggle" (click)="toggleSidebar()">
    <i class="bi" [ngClass]="isSidebarOpen ? 'bi-x-lg' : 'bi-list'"></i>
  </button>
  <img src="./images/Tmg-makerspace-Logo.png" alt="TMG Logo" class="mobile-logo" />
</div>

<!-- Sidebar Navigation -->
<nav class="sidebar" [class.open]="isSidebarOpen">
  <div class="sidebar-header">
    <img src="./images/Tmg-makerspace-Logo.png" alt="TMG Logo" class="sidebar-logo" />
  </div>

  <ul class="sidebar-nav">
    <li (click)="navigate('/admin/dashboard')" routerLinkActive="active">
      <i class="bi bi-house-fill"></i> Dashboard
    </li>
    <li (click)="navigate('/admin/members-management')" routerLinkActive="active">
      <i class="bi bi-people-fill"></i> Members
    </li>
    <li *ngIf="role !== 'member'" (click)="navigate('/admin/key-management')" routerLinkActive="active">
      <i class="bi bi-key-fill"></i> Key Management
    </li>
    <li (click)="navigate('/admin/account')" routerLinkActive="active">
      <i class="bi bi-person-circle"></i> Account
    </li>

    <li *ngIf="role === 'superadmin'" (click)="navigate('/admin/create-admin')" routerLinkActive="active">
      <i class="bi bi-shield-lock-fill"></i> Add Admin
    </li>
  </ul>
</nav>
