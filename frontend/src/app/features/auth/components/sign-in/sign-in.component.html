<div class="sign-in-container">
  <div class="sign-in-card">
    <h2>Sign In</h2>
    <p>Welcome back! Please sign in to your account.</p>

    <form [formGroup]="signInForm" (ngSubmit)="onSubmit()">
      <!-- Email/Username Field -->
      <div class="form-group">
        <label for="email">Email or Username</label>
        <div class="input-group">
          <input 
            type="email" 
            id="email" 
            class="form-control" 
            formControlName="email" 
            placeholder="Enter your email or username" 
            required>
          <span class="input-group-text"><i class="bi bi-person"></i></span>
        </div>
        <div class="form-text text-danger" *ngIf="signInForm.get('email')?.invalid && signInForm.get('email')?.touched">
          <span *ngIf="signInForm.get('email')?.hasError('required')">Email or username is required</span>
          <span *ngIf="signInForm.get('email')?.hasError('email')">Please enter a valid email address</span>
        </div>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-input">
          <input 
            [type]="hidePassword ? 'password' : 'text'" 
            id="password"
            class="form-control"
            formControlName="password" 
            placeholder="Enter your password"
            required>
          <button 
            type="button" 
            class="password-toggle" 
            (click)="hidePassword = !hidePassword"
            [attr.aria-label]="hidePassword ? 'Show password' : 'Hide password'">
            <i class="bi" [ngClass]="{'bi-eye': hidePassword, 'bi-eye-slash': !hidePassword}"></i>
          </button>
        </div>
        <div class="form-text text-danger" *ngIf="signInForm.get('password')?.invalid && signInForm.get('password')?.touched">
          <span *ngIf="signInForm.get('password')?.hasError('required')">Password is required</span>
          <span *ngIf="signInForm.get('password')?.hasError('minlength')">Password must be at least 6 characters</span>
        </div>
      </div>

      <!-- Remember Me & Forgot Password -->
      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" formControlName="rememberMe">
          <span>Remember me</span>
        </label>
        <a href="#" (click)="$event.preventDefault(); navigateToForgotPassword()" class="forgot-password">
          Forgot password?
        </a>
      </div>

      <!-- Error Message -->
      <div *ngIf="error" class="error-message">
        <i class="bi bi-exclamation-circle"></i>
        <span>{{ error }}</span>
      </div>

      <!-- Submit Button -->
      <button 
        type="submit" 
        class="btn btn-primary"
        [disabled]="!signInForm.valid || isLoading">
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
        <span *ngIf="isLoading" class="visually-hidden">Loading...</span>
      </button>
    </form>

    <div class="register-prompt">
      <span>Don't have an account?</span>
      <a href="#" (click)="$event.preventDefault(); navigateToRegister()" class="register-link">
        Create an account
      </a>
    </div>
  </div>
</div>
